# 生产环境配置
# 启动命令：java -jar yumy-bootstrap.jar --spring.profiles.active=prod

spring:
  # 数据源
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  # Redis
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
  # 生产环境关闭 Swagger
  springdoc:
    api-docs:
      enabled: false
    swagger-ui:
      enabled: false

# JWT
jwt:
  secret: ${JWT_SECRET}

# CORS 配置（生产环境单独配置允许的源）
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://yourdomain.com}

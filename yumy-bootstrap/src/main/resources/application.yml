server:
  port: 8080

spring:
  application:
    name: yumy-boot
  # 虚拟线程
  threads:
    virtual:
      enabled: true
  # Spring Cache
  cache:
    type: redis
  # 文件上传
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  global-config:
    db-config:
      # 雪花算法生成ID
      id-type: assign_id
      # 逻辑删除
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    # 驼峰转下划线
    map-underscore-to-camel-case: true

# Security
security:
  enabled: ${SECURITY_ENABLED:true}

# JWT
jwt:
  expiration: ${JWT_EXPIRATION:86400000}

# SpringDoc
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

# 文件上传
upload:
  base-path: .upload
  url-prefix: /upload
  max-file-size-mb: 10
